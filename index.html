<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMS INVESTMENT | Pro Network</title>
    
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --brand-red: #ff3b3b;
            --brand-dark: #191c1e;
            --brand-light: #f7f9fc;
            --dip-blue: #1e455e;
        }

        body { 
            margin: 0; 
            padding: 0; 
            background-color: var(--brand-light); 
            overflow-x: hidden; 
            color: var(--brand-dark);
            font-family: 'Inter', sans-serif;
        }
        
        .font-spartan { font-family: 'League Spartan', sans-serif; }
        .font-inter { font-family: 'Inter', sans-serif; }
        .font-libre { font-family: 'Libre Caslon Text', serif; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .reveal-up {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal-up.active {
            opacity: 1;
            transform: translateY(0);
        }

        .snap-container {
            height: 100vh;
            overflow-y: auto;
            scroll-behavior: smooth;
        }
        
        .card-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 5rem 1.5rem;
            position: relative;
        }

        .timeline-grid {
            display: grid;
            grid-template-columns: repeat(11, 1fr);
            position: relative;
            height: 200px;
        }
        .timeline-month-label {
            font-family: 'League Spartan', sans-serif;
            font-size: 10px;
            font-weight: 700;
            text-align: center;
            color: rgba(255,255,255,0.7);
            border-bottom: 1px solid rgba(255,255,255,0.15);
            padding-bottom: 10px;
            position: relative;
        }
        .timeline-month-label::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 50%;
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            transform: translateX(-50%);
        }
        .project-bar-v2 {
            position: absolute;
            height: 20px;
            border-radius: 1px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-family: 'League Spartan', sans-serif;
            font-size: 8px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            white-space: nowrap;
        }
        .project-bar-ip { background: white; color: var(--dip-blue); }
        .project-bar-gp { background: var(--brand-red); color: white; }

        .topics-sidebar {
            writing-mode: vertical-lr;
            transform: rotate(180deg);
            background: var(--dip-blue);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'League Spartan', sans-serif;
            font-weight: 800;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-size: 11px;
        }

        .logo-box {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 130px;
        }

        .sticky-hero-container {
            position: relative;
            width: 100%;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Utils: Animation Reveal (One-time trigger) ---
        const ScrollReveal = ({ children, delay = 0 }) => {
            const ref = useRef(null);
            const [isVisible, setIsVisible] = useState(false);
            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) {
                        setTimeout(() => setIsVisible(true), delay);
                        observer.unobserve(entry.target);
                    }
                }, { threshold: 0.4 });
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, [delay]);
            return <div ref={ref} className={`reveal-up ${isVisible ? 'active' : ''} w-full flex flex-col items-center`}>{children}</div>;
        };

        // --- Data (Visual Compensation) ---
        const schoolsData = [
            { id: "1j9Cph2RqeHURiBENRFUAe53EUVakrPAg", h: "75px" },
            { id: "1AiX6DX6pxNdID0CpzS6ldcJHuWFHIpD6", h: "70px" },
            { id: "1yrBkP5JdIruq3FcCe_fY3ifJ8wgBmIWQ", h: "60px" },
            { id: "1taYfqGVmoHNrKj4CcrCC2l6o_5Ja6y54", h: "95px" }, 
            { id: "1LLKAIAt2T7iDojbcCFtTEScDgWqmmNUP", h: "125px" }, 
            { id: "1QSDDs6SyBofuhHRwAG90iHkswgY-Q2jJ", h: "75px" },
            { id: "1KHdo0CETi275C4poc_UziKEYerQ6EWQc", h: "75px" },
            { id: "16YI6BRFrV1UmCcY6n02Q474OfI1Xqr7n", h: "115px" }, 
            { id: "1mdQlMRSqNKF0qQO9_9BOdrk9PRD1qfqq", h: "140px" }, 
            { id: "1SJGvkoULgLd0-0fCykEL55cZ9qslmLM6", h: "125px" }   
        ];

        const timelineData = [
            { label: "IP 1: ER", type: "ip", start: 0, end: 2.3, row: 0 },
            { label: "IP 2: LBO / ECM DCM", type: "ip", start: 3.1, end: 4.8, row: 0 },
            { label: "GP 1: LBO PJ", type: "gp", start: 1.8, end: 7, row: 1 },
            { label: "IP 3: Project Finance / M&A", type: "ip", start: 5.5, end: 7.2, row: 2 },
            { label: "GP 2: M&A", type: "gp", start: 4.5, end: 9.2, row: 3 }
        ];

        // --- View Components ---

        const HomeView = ({ scrollY, windowHeight }) => {
            const progress = Math.min(1, scrollY / windowHeight);
            const logoScale = 1 - (progress * 0.82); 
            const logoY = -(progress * 14);

            return (
                <div className="w-full">
                    <div className="sticky-hero-container">
                        <div className="absolute inset-0 w-full h-full pointer-events-none z-0">
                            <div className="sticky top-0 h-screen w-full bg-[#0a0a0a]">
                                <div className="absolute inset-0 bg-cover bg-center opacity-60" style={{ backgroundImage: "url('https://drive.google.com/thumbnail?id=1bF-GwJQpgupCHzX2cNal9KAYgDdvsea1&sz=w3000')" }} />
                                <div className="absolute inset-0 bg-black/50" />
                            </div>
                        </div>
                        <div className="absolute inset-0 w-full h-full pointer-events-none z-20">
                            <div className="sticky top-0 h-screen w-full flex items-center justify-center">
                                <img src="https://drive.google.com/thumbnail?id=1_AfeQO-hhZyAh-KkzHYYLpkA7FmGbA9z&sz=w2000" alt="JAMS" style={{ transform: `translateY(${logoY}vh) scale(${logoScale})`, transition: 'transform 0.1s ease-out' }} className="w-[70%] md:w-[40%] lg:w-[26%] max-w-[420px] object-contain drop-shadow-[0_0_40px_rgba(255,255,255,0.12)]" />
                            </div>
                        </div>
                        <div className="relative z-30">
                            <section className="h-screen bg-transparent"></section>
                            <section className="h-screen flex flex-col items-center justify-center px-6 bg-transparent">
                                <div className="font-inter text-sm md:text-base leading-relaxed font-light max-w-xl text-center text-white/80 drop-shadow-md translate-y-16 tracking-wide">
                                    JAMS Investment is a small-but-elite, mentorship-driven finance talent platform. Through high-touch mentorship supported by solid technical training, we build stronger connections.
                                </div>
                            </section>
                        </div>
                    </div>
                </div>
            );
        };

        const TeamsView = () => (
            <div className="w-full">

                    <div className="relative z-20 text-center px-6 reveal-up active">

                        <p className="mt-12 font-inter text-xs md:text-sm font-light text-white/40 uppercase tracking-[0.4em]">Structure coming soon...</p>
                    </div>
                </section>
            </div>
        );

        const DipView = ({ scrollY, windowHeight }) => {
            const dipProgress = Math.min(1, scrollY / windowHeight);
            const dipLogoScale = 1 - (dipProgress * 0.82); 
            const dipLogoY = -(dipProgress * 14);
            const months = ["2026/3", "2026/4", "2026/5", "2026/6", "2026/7", "2026/8", "2026/9", "2026/10", "2026/11", "2026/12", "2027/1"];

            return (
                <div className="w-full">
                    {/* Card 1: HEROCUT (DIP) */}
                    <div className="sticky-hero-container">
                        <div className="absolute inset-0 w-full h-full pointer-events-none z-0">
                            <div className="sticky top-0 h-screen w-full bg-[#0a0a0a]"></div>
                        </div>
                        <div className="absolute inset-0 w-full h-full pointer-events-none z-20">

                                <img src="https://drive.google.com/thumbnail?id=1WOS-DsLJesu97SGWafm-W_SVH46RNaLq&sz=w3000" alt="DIP" style={{ transform: `translateY(${dipLogoY}vh) scale(${dipLogoScale})`, transition: 'transform 0.1s ease-out' }} className="w-[85%] md:w-[60%] lg:w-[38%] max-w-[800px] object-contain drop-shadow-[0_0_50px_rgba(255,255,255,0.1)]" />
                            </div>

                            </section>
                        </div>
                    </div>

                    {/* Card 2: Cohort Selection Results (Balanced Spartan) */}

                            <p className="font-inter text-xs text-black/50 leading-relaxed max-w-xl text-center italic mb-20 uppercase tracking-widest px-6">"we received applications from a highly competitive pool of outstanding candidates worldwide. through a rigorous and selective review process."</p>
                        </ScrollReveal>

                        <div className="grid grid-cols-1 md:grid-cols-3 w-full max-w-5xl gap-10 divide-y md:divide-y-0 md:divide-x divide-black/10 mb-28 px-6">
                            {[{v:"15", l:"FINAL ADMITS"},{v:"9%", l:"ACCEPTANCE RATE"},{v:"165", l:"APPLICATIONS RECEIVED"}].map((s, i) => (
                                <ScrollReveal key={i} delay={i * 150}>
                                    <div className="flex flex-col items-center py-6 md:py-0 text-center">
                                        <span className="font-spartan font-bold text-4xl lg:text-6xl text-[#191c1e] tracking-tighter mb-1">{s.v}</span>
                                        <span className="font-spartan font-semibold text-[9px] tracking-[0.4em] text-black/40 uppercase">{s.l}</span>
                                    </div>
                                </ScrollReveal>
                            ))}
                        </div>

                        <div className="w-full flex flex-col items-center max-w-6xl">
                            <ScrollReveal delay={400}>
                                <span className="font-spartan text-[9px] tracking-[0.6em] font-bold text-[#820000] uppercase mb-4">Selections Worldwide</span>
                                <p className="text-[7px] text-black/30 font-bold uppercase tracking-[0.4em] mb-16 px-6 text-center">(Taiwan / Hong Kong / Singapore / France / UK / Italy / USA / Indonesia)</p>
                            </ScrollReveal>
                            <div className="grid grid-cols-2 md:grid-cols-5 gap-x-12 gap-y-10 lg:gap-x-16 lg:gap-y-12 px-8">
                                {schoolsData.map((s, i) => (
                                    <ScrollReveal key={i} delay={i * 80}>
                                        <div className="logo-box"><img src={`https://drive.google.com/thumbnail?id=${s.id}&sz=w1000`} alt="School" style={{ height: s.h }} className="object-contain max-w-full" /></div>
                                    </ScrollReveal>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Card 3: Program Overview (Refined Scale) */}
                    <section className="card-section bg-[#1e455e] text-white z-40 relative px-6">
                        <div className="absolute inset-0 bg-cover bg-center opacity-10 pointer-events-none" style={{ backgroundImage: "url('https://drive.google.com/thumbnail?id=1bF-GwJQpgupCHzX2cNal9KAYgDdvsea1&sz=w3000')" }} />
                        <ScrollReveal><h2 className="font-spartan font-bold text-3xl md:text-5xl uppercase tracking-tighter mb-20 text-center leading-none uppercase">PROGRAM <br/> OVERVIEW</h2></ScrollReveal>
                        <div className="grid grid-cols-1 md:grid-cols-3 w-full max-w-6xl border border-white/10 bg-white/5 backdrop-blur-lg">
                            {[
                                { title: "Guest Speaker", items: ["Industry Insights", "Investment Banking", "Private Equity", "Project Financing"] },
                                { title: "Mentorship", items: ["Career Training & Coaching", "Interview Preparation", "Resume Workshop", "Private Alumni Network"] },
                                { title: "Technical Training", items: ["Deal Analysis & Underwriting Fundamentals", "Discounted Cash Flow Modeling", "Accretion/Dilution Modeling", "Leveraged Buyout Modeling and more..."] }
                            ].map((col, i) => (
                                <div key={i} className={`flex flex-col p-10 lg:p-14 ${i !== 2 ? 'md:border-r border-white/10' : ''}`}>
                                    <h3 className="font-spartan font-bold text-xs mb-10 border-b border-white/5 pb-4 text-center tracking-[0.3em] uppercase">{col.title}</h3>
                                    <ul className="space-y-6 flex-1 flex flex-col justify-center items-center text-center">
                                        {col.items.map((item, j) => (
                                            <li key={j} className={`font-inter text-[11px] ${j === 0 ? 'font-bold opacity-100' : 'opacity-50'} tracking-widest leading-relaxed uppercase`}>{item}</li>
                                        ))}
                                    </ul>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Card 4: Education Planning */}
                    <section className="card-section bg-[#1e455e] overflow-hidden pt-0 pb-32 z-40 relative px-6">
                        <div className="max-w-6xl mx-auto relative z-10 text-white w-full">
                            <ScrollReveal><h2 className="font-spartan font-bold text-3xl md:text-5xl uppercase tracking-tighter mb-4 text-center leading-none uppercase">EDUCATION <br/> PLANNING</h2></ScrollReveal>
                            <div className="mb-20 overflow-x-auto no-scrollbar pb-8 mt-14 text-center">
                                <div className="min-w-[1000px]">
                                    <div className="flex justify-center gap-10 mb-12 text-[9px] font-spartan font-bold tracking-[0.5em] uppercase">
                                        <div className="flex items-center gap-3"><div className="w-2.5 h-2.5 bg-white"></div> Individual Project</div>
                                        <div className="flex items-center gap-3"><div className="w-2.5 h-2.5 bg-[#ff3b3b]"></div> Group Project</div>
                                    </div>
                                    <div className="timeline-grid">
                                        {months.map((m, i) => ( <div key={i} className="timeline-month-label">{m}</div> ))}
                                        {timelineData.map((p, i) => ( <div key={i} className={`project-bar-v2 ${p.type === 'ip' ? 'project-bar-ip' : 'project-bar-gp'}`} style={{ left: `calc(${(p.start / 10) * 100}%)`, width: `calc(${( (p.end - p.start) / 10) * 100}%)`, top: `${60 + (p.row * 35)}px` }}>{p.label}</div> ))}
                                    </div>
                                </div>
                            </div>
                            <div className="bg-white rounded-sm shadow-2xl overflow-hidden text-[#1e455e] flex flex-col md:flex-row max-w-5xl mx-auto">
                                <div className="topics-sidebar p-6 md:w-16">TOPICS</div>
                                <div className="flex-1 grid grid-cols-1 md:grid-cols-2 divide-x divide-black/5">
                                    <div className="divide-y divide-black/5">
                                        {["Modeling Fundamentals", "3FS Projection", "Advanced Accounting", "Enterprise Value & Equity Value", "WACC & DCF", "Trading Comparables", "ECM / DCM Basics & Modeling", "Project Finance Modeling", "Accretion/DILUTION Analysis", "M&A Modeling", "LBO Modeling"].map((t, i) => (

                            <div className="bg-[#1e455e] p-12 md:p-16 flex flex-col border-l border-white/5 divide-y divide-white/5">
                                <p className="font-spartan text-[10px] font-bold tracking-[0.4em] text-white/30 uppercase mb-16 text-center">Program Topics</p>
                                {["DEAL ADVISORY", "RENEWABLE ENERGY PROJECT FINANCE", "PRIVATE EQUITY IN MIAMI", "NYC BOUTIQUE INVESTMENT BANK", "TAIWAN GROWTH EQUITY", "EQUITY RESEARCH", "EUROPE INFRASTRUCTURE PE", "HONG KONG PRIVATE BANKING", "TAIWAN PRIVATE EQUITY", "FIXED INCOME & ASSET MGMT"].map((t, i) => (
                                    <div key={i} className="py-5 font-spartan font-bold text-[10px] md:text-[11px] tracking-[0.2em] text-white/70 hover:text-[#ff3b3b] transition-colors cursor-default uppercase">{t}</div>
                                ))}
                            </div>
                        </div>
                    </section>
                </div>
            );
        };

        // --- Controller ---
        const App = () => {
            const [currentPage, setCurrentPage] = useState('dip'); 
            const [scrollY, setScrollY] = useState(0);
            const [windowHeight, setWindowHeight] = useState(800);
            const containerRef = useRef(null);

            useEffect(() => {
                setWindowHeight(window.innerHeight);
                const container = containerRef.current;
                const handleScroll = () => { if (container) setScrollY(container.scrollTop); };
                if (container) container.addEventListener('scroll', handleScroll);
                return () => container && container.removeEventListener('scroll', handleScroll);
            }, [currentPage]);

            const navigate = (page) => {
                setCurrentPage(page);
                if (containerRef.current) containerRef.current.scrollTo({ top: 0, behavior: 'smooth' });
            };

            return (
                <div ref={containerRef} className="snap-container no-scrollbar relative bg-[#0a0a0a]">
                    {/* Navigation Refined */}
                    <nav className={`fixed top-0 left-0 z-50 w-full flex items-center justify-between px-6 md:px-12 py-7 transition-all duration-700 ${scrollY > 100 ? 'bg-black/90 backdrop-blur-xl py-4 shadow-2xl' : 'bg-transparent text-white'}`}>
                        <button onClick={() => navigate('home')} className="font-libre font-bold text-xl lg:text-2xl uppercase tracking-tighter hover:text-[#ff3b3b] transition-all duration-300">
                            JAMS INVESTMENT
                        </button>
                        <div className="flex gap-10 font-inter text-[11px] font-bold tracking-[0.3em] uppercase">
                            <button onClick={() => navigate('home')} className={`transition-all duration-500 relative pb-1 ${currentPage === 'home' ? 'text-[#ff3b3b]' : 'hover:text-[#ff3b3b]'}`}>
                                ABOUT {currentPage === 'home' && <div className="absolute -bottom-1 left-0 w-full h-[2px] bg-[#ff3b3b]"></div>}
                            </button>
                            <button onClick={() => navigate('teams')} className={`transition-all duration-500 relative pb-1 ${currentPage === 'teams' ? 'text-[#ff3b3b]' : 'hover:text-[#ff3b3b]'}`}>
                                TEAMS {currentPage === 'teams' && <div className="absolute -bottom-1 left-0 w-full h-[2px] bg-[#ff3b3b]"></div>}
                            </button>
                            <button onClick={() => navigate('dip')} className={`transition-all duration-500 relative pb-1 ${currentPage === 'dip' ? 'text-[#ff3b3b]' : 'hover:text-[#ff3b3b]'}`}>
                                DIP {currentPage === 'dip' && <div className="absolute -bottom-1 left-0 w-full h-[2px] bg-[#ff3b3b]"></div>}
                            </button>
                        </div>
                    </nav>

                    {currentPage === 'home' && <HomeView scrollY={scrollY} windowHeight={windowHeight} />}
                    {currentPage === 'teams' && <TeamsView />}
                    {currentPage === 'dip' && <DipView scrollY={scrollY} windowHeight={windowHeight} />}

                    <footer className="bg-[#0a0a0a] text-white px-8 md:px-12 py-16 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-8 relative z-50">
                        <div className="flex flex-col items-center md:items-start">
                            <span className="font-libre font-bold text-2xl uppercase tracking-tighter mb-2">JAMS INVESTMENT</span>
                            <span className="font-spartan text-[10px] tracking-[0.5em] font-bold opacity-30 uppercase">Elite Society of Finance</span>
                        </div>
                        <span className="font-spartan text-[9px] tracking-[0.2em] font-bold opacity-30 uppercase">© 2026 JAMS INVESTMENT. All Rights Reserved.</span>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
