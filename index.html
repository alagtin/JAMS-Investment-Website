<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMS INVESTMENT | Pro Network</title>
    
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400;1,700&display=swap');
        
        :root {
            --brand-red: #ff3b3b;
            --brand-dark-red: #820000;
            --brand-dark: #191c1e;
            --brand-light: #f7f9fc;
            --dip-blue: #1e455e;
        }

        body { 
            margin: 0; 
            padding: 0; 
            background-color: var(--brand-light); 
            overflow-x: hidden; 
            color: var(--brand-dark);
        }
        
        .font-inter { font-family: 'Inter', sans-serif; }
        .font-libre { font-family: 'Libre Caslon Text', serif; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .reveal-up {
            opacity: 0;
            transform: translateY(40px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal-up.active {
            opacity: 1;
            transform: translateY(0);
        }

        .snap-container {
            scroll-snap-type: y proximity;
            height: 100vh;
            overflow-y: auto;
            scroll-behavior: smooth;
        }
        .snap-section {
            scroll-snap-align: start;
            min-height: 100vh;
        }

        /* Timeline Styles */
        .timeline-grid {
            display: grid;
            grid-template-columns: repeat(11, 1fr);
            position: relative;
            height: 200px;
        }
        .timeline-month-label {
            font-size: 10px;
            font-weight: 800;
            text-align: center;
            color: rgba(255,255,255,0.9);
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 8px;
            position: relative;
        }
        .timeline-month-label::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            transform: translateX(-50%);
        }
        .project-bar-v2 {
            position: absolute;
            height: 20px;
            border-radius: 2px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            white-space: nowrap;
        }
        .project-bar-ip { background: white; color: var(--dip-blue); }
        .project-bar-gp { background: var(--brand-red); color: white; }

        /* 展示牆格位：固定比例但內部圖片自適應 */
        .school-wall-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            width: 100%;
            max-width: 1200px;
        }
        @media (min-width: 768px) {
            .school-wall-grid {
                grid-template-columns: repeat(5, 1fr);
                gap: 4rem;
            }
        }
        .school-wall-item {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 180px; /* 拉大展示高度，確保大圖有足夠空間 */
            transition: transform 0.4s ease;
        }
        .school-wall-img {
            max-width: 100%;
            width: auto;
            object-fit: contain;
            transition: transform 0.4s ease;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 全域資料區 (Global Data)
        // ==========================================
        const statsDip = [
            { value: "15", label: "FINAL ADMITS" },
            { value: "9%", label: "ACCEPTANCE RATE" },
            { value: "165", label: "APPLICATIONS RECEIVED" }
        ];

        // 學校清單：針對視覺弱勢標誌（如圓形或方形）進行高度補償
        // 台大與 Bocconi 大幅增加高度以達成視覺平衡
        const allSchools = [
            { name: "NTU Singapore", id: "1j9Cph2RqeHURiBENRFUAe53EUVakrPAg", h: "75px" },
            { name: "KCL", id: "1AiX6DX6pxNdID0CpzS6ldcJHuWFHIpD6", h: "80px" },
            { name: "Kelley", id: "1yrBkP5JdIruq3FcCe_fY3ifJ8wgBmIWQ", h: "70px" },
            { name: "NTU Taiwan", id: "1taYfqGVmoHNrKj4CcrCC2l6o_5Ja6y54", h: "100px" }, // 顯著放大
            { name: "Tsinghua", id: "1LLKAIAt2T7iDojbcCFtTEScDgWqmmNUP", h: "135px" }, // 圓形顯著放大
            { name: "NUS", id: "1QSDDs6SyBofuhHRwAG90iHkswgY-Q2jJ", h: "75px" },
            { name: "HEC Paris", id: "1KHdo0CETi275C4poc_UziKEYerQ6EWQc", h: "75px" },
            { name: "ESSEC", id: "16YI6BRFrV1UmCcY6n02Q474OfI1Xqr7n", h: "115px" }, // 方形補償
            { name: "Bocconi", id: "1mdQlMRSqNKF0qQO9_9BOdrk9PRD1qfqq", h: "140px" }, // 圓形顯著放大
            { name: "HKU", id: "1SJGvkoULgLd0-0fCykEL55cZ9qslmLM6", h: "135px" }   // 圓形顯著放大
        ];

        const ScrollReveal = ({ children, delay = 0 }) => {
            const ref = useRef(null);
            const [isVisible, setIsVisible] = useState(false);
            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) setTimeout(() => setIsVisible(true), delay);
                }, { threshold: 0.1 });
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, [delay]);
            return <div ref={ref} className={`reveal-up ${isVisible ? 'active' : ''}`}>{children}</div>;
        };

        const HomeView = ({ scrollY, windowHeight }) => {
            const heroProgress = Math.max(0, Math.min(1, scrollY / windowHeight));
            const logoScale = 1 - (heroProgress * 0.85); 
            const logoY = -(heroProgress * 12); 
            return (
                <div className="w-full">
                    <div className="relative w-full z-10">
                        <div className="absolute inset-0 w-full h-full pointer-events-none z-0">
                            <div className="sticky top-0 h-screen w-full">
                                <div className="absolute inset-0 bg-cover bg-center opacity-80" style={{ backgroundImage: "url('https://drive.google.com/thumbnail?id=1bF-GwJQpgupCHzX2cNal9KAYgDdvsea1&sz=w3000')" }} />
                                <div className="absolute inset-0 bg-black/60 z-10" />
                            </div>
                        </div>
                        <div className="absolute inset-0 w-full h-full pointer-events-none z-20">
                            <div className="sticky top-0 h-screen w-full flex items-center justify-center">
                                <img src="https://drive.google.com/thumbnail?id=1_AfeQO-hhZyAh-KkzHYYLpkA7FmGbA9z&sz=w2000" alt="JAMS" style={{ transform: `translateY(${logoY}vh) scale(${logoScale})` }} className="w-[70%] md:w-[45%] lg:w-[30%] max-w-[500px] object-contain drop-shadow-[0_0_40px_rgba(255,255,255,0.15)]" />
                            </div>
                        </div>
                        <div className="relative z-30">
                            <section className="snap-section w-full h-screen bg-transparent"></section>
                            <section id="about" className="snap-section relative w-full h-screen flex flex-col items-center justify-center px-6 bg-transparent">
                                <div className="font-inter text-sm md:text-base leading-relaxed font-light max-w-2xl text-center text-white/90 drop-shadow-md -translate-y-2">
                                    JAMS Investment is a small-but-elite, mentorship-driven finance talent platform. Through high-touch mentorship supported by solid technical training, we build stronger, more direct industry connections and a long-term pipeline. Every member can grow with greater focus, depth, and efficiency within limited resources.
                                </div>
                            </section>
                        </div>
                    </div>
                </div>
            );
        };

        const DipView = ({ scrollY, windowHeight }) => {
            const dipProgress = Math.max(0, Math.min(1, scrollY / windowHeight));
            const dipImageScale = 1 - (dipProgress * 0.82); 
            const dipImageY = -(dipProgress * 32); 

            const timelineData = [
                { label: "IP 1: ER", type: "ip", start: 0, end: 2.3, row: 0 },
                { label: "IP 2: LBO / ECM DCM", type: "ip", start: 3.1, end: 4.8, row: 0 },
                { label: "GP 1: LBO PJ", type: "gp", start: 1.8, end: 7, row: 1 },
                { label: "IP 3: Project Finance / M&A", type: "ip", start: 5.5, end: 7.2, row: 2 },
                { label: "GP 2: M&A", type: "gp", start: 4.5, end: 9.2, row: 3 }
            ];

            return (
                <div className="w-full">
                    <div className="relative w-full z-10">
                        <div className="absolute inset-0 w-full h-full pointer-events-none z-0">
                            <div className="sticky top-0 h-screen w-full bg-[#0a0a0a]"></div>
                        </div>
                        <div className="absolute inset-0 w-full h-full pointer-events-none z-20">
                            <div className="sticky top-0 h-screen w-full flex items-center justify-center px-4 overflow-hidden">
                                <img src="https://drive.google.com/thumbnail?id=1WOS-DsLJesu97SGWafm-W_SVH46RNaLq&sz=w3000" alt="DIP" style={{ transform: `translateY(${dipImageY}vh) scale(${dipImageScale})`, transition: 'transform 0.1s ease-out' }} className="w-[85%] md:w-[65%] lg:w-[45%] max-w-[1000px] object-contain drop-shadow-[0_0_60px_rgba(255,255,255,0.1)]" />
                            </div>
                        </div>
                        <div className="relative z-30">
                            <section className="snap-section w-full h-screen bg-transparent"></section>
                            <section className="snap-section relative w-full h-screen flex flex-col items-center justify-center px-6 bg-transparent">
                                <div className="font-inter text-sm md:text-base leading-relaxed font-light max-w-2xl text-center text-white/90 drop-shadow-md translate-y-20">
                                    JAMS Direct Industry Program (DIP) is an exclusive, high-density training platform designed to bridge the gap between top Asian talent and global financial hubs. Through rigorous technical training and high-touch mentorship, we build a direct pipeline to the world's leading firms.
                                </div>
                            </section>
                        </div>
                    </div>

                    <div className="relative z-40 bg-white">
                        <section className="py-24 px-6 flex flex-col items-center border-b border-black/5 bg-[#f7f9fc]">
                            <div className="max-w-4xl text-center mb-20">
                                <ScrollReveal><div className="flex justify-center mb-8"><div className="px-5 py-2 border-2 border-[#191c1e] font-inter text-[11px] font-black tracking-[0.4em] uppercase">Cohort Selection Results</div></div></ScrollReveal>
                                <ScrollReveal delay={200}><p className="font-inter text-xs md:text-sm text-black/50 leading-relaxed max-w-2xl mx-auto italic mb-16 uppercase">"we received applications from a highly competitive pool of outstanding candidates worldwide. through a rigorous and selective review process, we carefully chose this cohort of admits."</p></ScrollReveal>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 w-full max-w-6xl gap-12 divide-y md:divide-y-0 md:divide-x divide-black/10 mb-32">
                                {statsDip.map((s, i) => (
                                    <ScrollReveal key={i} delay={i * 150}>
                                        <div className="flex flex-col items-center py-8 md:py-0 group">
                                            <span className="font-libre font-bold text-7xl text-[#191c1e] tracking-tighter mb-2 group-hover:text-[#820000] transition-colors">{s.value}</span>
                                            <span className="font-inter font-bold text-[10px] tracking-widest text-black/40 uppercase">{s.label}</span>
                                        </div>
                                    </ScrollReveal>
                                ))}
                            </div>

                            {/* 學校展示牆：手動視覺補償校正 */}
                            <div className="w-full flex flex-col items-center px-4 mb-24">
                                <div className="text-center mb-24">
                                    <span className="font-inter text-[9px] tracking-[0.4em] font-black text-[#820000] uppercase">Selections Worldwide</span>
                                    <div className="text-[8px] text-black/30 mt-2 uppercase tracking-widest font-bold">(Taiwan / Hong Kong / Singapore / France / UK / Italy / USA / Indonesia)</div>
                                </div>
                                
                                <div className="school-wall-grid">
                                    {allSchools.map((school, i) => (
                                        <ScrollReveal key={i} delay={i * 80}>
                                            <div className="school-wall-item">
                                                <img 
                                                    src={`https://drive.google.com/thumbnail?id=${school.id}&sz=w1000`} 
                                                    alt={school.name} 
                                                    style={{ height: school.h }}
                                                    className="school-wall-img"
                                                />
                                            </div>
                                        </ScrollReveal>
                                    ))}
                                </div>
                            </div>
                        </section>

                        <section className="relative w-full bg-[#1e455e] py-20 px-6 overflow-hidden">
                            <div className="absolute inset-0 bg-cover bg-center opacity-20 pointer-events-none" style={{ backgroundImage: "url('https://drive.google.com/thumbnail?id=1bF-GwJQpgupCHzX2cNal9KAYgDdvsea1&sz=w3000')" }} />
                            <div className="max-w-6xl mx-auto relative z-10 text-white">
                                <div className="text-center mb-12">
                                    <h2 className="font-libre text-4xl md:text-5xl uppercase tracking-tighter mb-2">Education Planning</h2>
                                    <p className="font-inter text-[9px] tracking-[0.4em] opacity-60 font-bold uppercase">JAMS Direct Industry Program 2026</p>
                                </div>
                                <div className="mb-20 overflow-x-auto no-scrollbar pb-5">
                                    <div className="min-w-[1000px]">
                                        <div className="flex justify-center gap-10 mb-10 text-[9px] font-black tracking-[0.2em] uppercase">
                                            <div className="flex items-center gap-2"><div className="w-2.5 h-2.5 bg-white"></div> Individual Project</div>
                                            <div className="flex items-center gap-2"><div className="w-2.5 h-2.5 bg-[#ff3b3b]"></div> Group Project</div>
                                        </div>
                                        <div className="timeline-grid">
                                            {["2026/3", "2026/4", "2026/5", "2026/6", "2026/7", "2026/8", "2026/9", "2026/10", "2026/11", "2026/12", "2027/1"].map((m, i) => (
                                                <div key={i} className="timeline-month-label">{m}</div>
                                            ))}
                                            {timelineData.map((p, i) => (
                                                <div key={i} className={`project-bar-v2 ${p.type === 'ip' ? 'project-bar-ip' : 'project-bar-gp'}`} style={{ left: `calc(${(p.start / 10) * 100}%)`, width: `calc(${( (p.end - p.start) / 10) * 100}%)`, top: `${50 + (p.row * 32)}px` }}>{p.label}</div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-white rounded-sm shadow-2xl overflow-hidden text-[#1e455e] flex flex-col md:flex-row">
                                    <div className="topics-sidebar p-4 md:w-14">TOPICS</div>
                                    <div className="flex-1">
                                        <div className="grid grid-cols-1 md:grid-cols-2">
                                            <div className="divide-y divide-black/5 border-r border-black/5">
                                                {["Modeling Fundamentals", "3FS Projection", "Advanced Accounting", "Enterprise Value & Equity Value", "WACC & DCF", "Trading Comparables", "ECM / DCM Basics & Modeling", "Project Finance Modeling", "Accretion/DILUTION Analysis", "M&A Modeling", "LBO Modeling"].map((t, i) => (
                                                    <div key={i} className="p-3 text-[11px] font-bold uppercase tracking-wide hover:bg-slate-50 transition-colors flex items-center justify-between group">
                                                        <span>{t}</span><span className="text-[#ff3b3b] opacity-0 group-hover:opacity-100 transition-opacity">◈</span>
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="bg-slate-50 flex flex-col divide-y divide-black/5 font-inter">
                                                <div className="p-6 flex-1 flex flex-col justify-center items-center text-center">
                                                    <div className="text-[9px] font-black opacity-30 uppercase mb-1">Scope A</div>
                                                    <div className="text-xs font-extrabold uppercase leading-tight">Individual Project 1: <br/>Equity Research</div>
                                                </div>
                                                <div className="p-6 flex-1 flex flex-col justify-center items-center text-center">
                                                    <div className="text-[9px] font-black opacity-30 uppercase mb-1">Scope B</div>
                                                    <div className="text-xs font-extrabold uppercase leading-tight">Individual Project 2: ECM / DCM <br/>Individual Project 3: Project Finance</div>
                                                </div>
                                                <div className="p-6 flex-1 flex flex-col justify-center items-center text-center bg-white">
                                                    <div className="text-[9px] font-black text-[#ff3b3b] uppercase mb-1 italic">Scope C - Capstone</div>
                                                    <div className="text-xs font-extrabold uppercase leading-tight">Group Project 1: LBO PJ <br/>Individual Project 2: LBO Modeling</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
            );
        };

        const TeamsView = () => (
            <div className="w-full">
                <section className="relative w-full h-screen flex flex-col items-center justify-center overflow-hidden bg-[#0a0a0a]">
                    <div className="absolute inset-0 bg-cover bg-center opacity-40" style={{ backgroundImage: "url('https://drive.google.com/thumbnail?id=1bF-GwJQpgupCHzX2cNal9KAYgDdvsea1&sz=w3000')" }} />
                    <div className="relative z-20 flex flex-col items-center text-center px-6 reveal-up active">
                        <span className="font-inter text-xs tracking-[0.5em] text-[#ff3b3b] uppercase mb-4 font-bold">The People</span>
                        <h1 className="font-libre font-bold text-5xl md:text-7xl lg:text-[5rem] tracking-tighter uppercase leading-[1.1] text-white">MEET THE <br/> JAMS TEAM</h1>
                        <p className="font-inter text-sm md:text-base font-light text-white/50 mt-8 tracking-widest uppercase">Structure coming soon...</p>
                    </div>
                </section>
            </div>
        );

        const App = () => {
            const getPageFromUrl = () => {
                const params = new URLSearchParams(window.location.search);
                return params.get('page') || 'home';
            };
            const [currentPage, setCurrentPage] = useState(getPageFromUrl());
            const [scrolled, setScrolled] = useState(false);
            const [scrollY, setScrollY] = useState(0);
            const [windowHeight, setWindowHeight] = useState(800);
            const containerRef = useRef(null);

            useEffect(() => {
                const handlePopState = () => setCurrentPage(getPageFromUrl());
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            const handleNavigate = (page) => {
                setCurrentPage(page);
                try {
                    const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + (page === 'home' ? '' : `?page=${page}`);
                    window.history.pushState({ path: newUrl }, '', newUrl);
                } catch (e) {}
            };

            useEffect(() => {
                setWindowHeight(window.innerHeight);
                const container = containerRef.current;
                const handleScroll = () => {
                    const currentScroll = container.scrollTop;
                    setScrollY(currentScroll);
                    if (currentPage === 'home' || currentPage === 'dip') {
                        setScrolled(currentScroll > window.innerHeight * 1.5);
                    } else {
                        setScrolled(currentScroll > 100);
                    }
                };
                container.addEventListener('scroll', handleScroll, { passive: true });
                return () => container.removeEventListener('scroll', handleScroll);
            }, [currentPage]);

            useEffect(() => { if (containerRef.current) containerRef.current.scrollTop = 0; }, [currentPage]);

            return (
                <div ref={containerRef} className="snap-container no-scrollbar relative bg-[#0a0a0a]">
                    <nav className={`fixed top-0 left-0 z-50 w-full flex items-center justify-between px-6 md:px-12 transition-all duration-700 ${scrolled ? 'bg-white/95 backdrop-blur-md text-[#191c1e] py-5 shadow-sm' : 'bg-transparent text-white py-8'}`}>
                        <button onClick={() => handleNavigate('home')} className="group focus:outline-none">
                            <span className={`font-libre font-bold text-xl uppercase tracking-tighter block ${scrolled ? '' : 'drop-shadow-md'}`}>JAMS INVESTMENT</span>
                        </button>
                        <div className={`hidden md:flex gap-10 font-inter text-[10px] font-bold tracking-[0.2em] uppercase ${scrolled ? '' : 'drop-shadow-md'}`}>
                            <button onClick={() => { handleNavigate('home'); setTimeout(() => { if (containerRef.current) containerRef.current.scrollTo({ top: 0, behavior: 'smooth' }); }, 100); }} className="hover:text-[#ff3b3b] transition-colors focus:outline-none tracking-[0.2em]">ABOUT</button>
                            <button onClick={() => handleNavigate('teams')} className={`hover:text-[#ff3b3b] transition-colors focus:outline-none tracking-[0.2em] ${currentPage === 'teams' ? 'text-[#ff3b3b]' : ''}`}>TEAMS</button>
                            <button onClick={() => handleNavigate('dip')} className={`hover:text-[#ff3b3b] transition-colors focus:outline-none tracking-[0.2em] ${currentPage === 'dip' ? 'text-[#ff3b3b]' : ''}`}>DIP</button>
                        </div>
                    </nav>
                    {currentPage === 'home' && <HomeView scrollY={scrollY} windowHeight={windowHeight} />}
                    {currentPage === 'dip' && <DipView scrollY={scrollY} windowHeight={windowHeight} />}
                    {currentPage === 'teams' && <TeamsView />}
                    <footer className="bg-[#0a0a0a] text-white px-8 md:px-12 py-16 flex flex-col md:flex-row justify-between items-center text-center md:text-left relative z-20 border-t border-white/5">
                        <button onClick={() => handleNavigate('home')} className="font-libre font-bold text-xl uppercase tracking-tighter hover:text-[#ff3b3b] transition-colors mb-4 md:mb-0 focus:outline-none">JAMS INVESTMENT</button>
                        <span className="font-inter text-[9px] tracking-[0.2em] font-bold opacity-30 uppercase">© 2026 JAMS INVESTMENT. All Rights Reserved.</span>
                    </footer>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
