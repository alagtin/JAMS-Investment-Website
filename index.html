<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMS INVESTMENT | Pro Network</title>
    
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400;1,700&display=swap');
        
        :root {
            --brand-red: #ff3b3b;
            --brand-dark-red: #820000;
            --brand-dark: #191c1e;
            --brand-light: #f7f9fc;
            --dip-blue: #1e455e;
        }

        body { 
            margin: 0; 
            padding: 0; 
            background-color: var(--brand-light); 
            overflow-x: hidden; 
            color: var(--brand-dark);
        }
        
        .font-inter { font-family: 'Inter', sans-serif; }
        .font-libre { font-family: 'Libre Caslon Text', serif; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes marqueeSeamless {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            display: flex;
            width: max-content;
            animation: marqueeSeamless 40s linear infinite;
        }

        .reveal-up {
            animation: revealUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes revealUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .snap-container {
            scroll-snap-type: y proximity;
            height: 100vh;
            overflow-y: auto;
            scroll-behavior: smooth;
        }
        .snap-section {
            scroll-snap-align: start;
            min-height: 100vh;
        }

        /* Timeline Advanced Styles */
        .timeline-grid {
            display: grid;
            grid-template-columns: repeat(11, 1fr);
            position: relative;
            height: 320px;
        }
        .timeline-month-label {
            font-size: 11px;
            font-weight: 800;
            text-align: center;
            color: rgba(255,255,255,0.9);
            border-bottom: 2px solid rgba(255,255,255,0.3);
            padding-bottom: 10px;
            position: relative;
        }
        .timeline-month-label::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            transform: translateX(-50%);
        }
        .project-bar-v2 {
            position: absolute;
            height: 22px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            white-space: nowrap;
        }
        .project-bar-ip { background: white; color: var(--dip-blue); }
        .project-bar-gp { background: var(--brand-red); color: white; }

        /* Topics Table V2 */
        .topics-sidebar {
            writing-mode: vertical-lr;
            transform: rotate(180deg);
            background: var(--dip-blue);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 全域資料區 (Global Data)
        // ==========================================
        const pillarsHome = [
            { title: "ELITE MENTORSHIP", desc: "Direct one-on-one pipelines with practitioners from Bulge Bracket IB and Tier-1 PE firms.", icon: "◈" },
            { title: "TECHNICAL EDGE", desc: "Rigorous training focusing on LBO modeling, advanced valuation, and institutional research methodology.", icon: "◈" },
            { title: "GLOBAL PIPELINE", desc: "Bridging the gap between Asian talent and global financial hubs through structured referrals.", icon: "◈" }
        ];
        
        const statsDip = [
            { value: "15", label: "FINAL ADMITS" },
            { value: "9%", label: "ACCEPTANCE RATE" },
            { value: "165", label: "APPLICATIONS RECEIVED" }
        ];

        const schoolsHome = ["Wharton", "LBS", "NTU", "HKU", "NUS", "Columbia", "INSEAD", "NYU Stern", "LSE"];
        const firmsHome = ["Goldman Sachs", "Morgan Stanley", "J.P. Morgan", "BlackRock", "KKR", "Point72", "Bridgewater", "Citadel"];

        // ==========================================
        // 3D 地球元件
        // ==========================================
        const InteractiveGlobe = ({ size = 60, color = 0x820000, autoRotate = true }) => {
            const mountRef = useRef(null);
            const globeRef = useRef(null);
            useEffect(() => {
                const mount = mountRef.current;
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(45, mount.clientWidth / mount.clientHeight, 1, 1000);
                camera.position.z = 180;
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(mount.clientWidth, mount.clientHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                mount.appendChild(renderer.domElement);
                const globeGroup = new THREE.Group();
                globeRef.current = globeGroup;
                scene.add(globeGroup);
                const mapUrl = "https://raw.githubusercontent.com/turban/three.js-globe/master/img/world-alpha.png";
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.src = mapUrl;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 1024; canvas.height = 512;
                    ctx.drawImage(img, 0, 0, 1024, 512);
                    const data = ctx.getImageData(0, 0, 1024, 512).data;
                    const positions = [];
                    for (let i = 0; i < 20000; i++) {
                        const phi = Math.acos(-1 + (2 * i) / 20000);
                        const theta = Math.sqrt(20000 * Math.PI) * phi;
                        const lat = 90 - (phi * 180) / Math.PI;
                        const lon = ((theta * 180) / Math.PI) % 360 - 180;
                        const x_px = Math.floor(((lon + 180) / 360) * 1024);
                        const y_px = Math.floor(((90 - lat) / 180) * 512);
                        if (data[(y_px * 1024 + x_px) * 4] > 20) {
                            const phi_rad = (90 - lat) * (Math.PI / 180);
                            const theta_rad = (lon + 180) * (Math.PI / 180);
                            positions.push(-size * Math.sin(phi_rad) * Math.cos(theta_rad), size * Math.cos(phi_rad), size * Math.sin(phi_rad) * Math.sin(theta_rad));
                        }
                    }
                    const geometry = new THREE.BufferGeometry();
                    geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                    globeGroup.add(new THREE.Points(geometry, new THREE.PointsMaterial({ color, size: 0.7, transparent: true, opacity: 0.5 })));
                };
                const animate = () => {
                    requestAnimationFrame(animate);
                    if (globeRef.current && autoRotate) globeRef.current.rotation.y += 0.0025;
                    renderer.render(scene, camera);
                };
                animate();
                return () => { if (mount && renderer.domElement) mount.removeChild(renderer.domElement); };
            }, [size, color, autoRotate]);
            return <div ref={mountRef} className="w-full h-full" />;
        };

        // ==========================================
        // 頁面視圖 (Views)
        // ==========================================

        const HomeView = ({ scrollY, windowHeight }) => {
            const heroProgress = Math.max(0, Math.min(1, scrollY / windowHeight));
            const logoScale = 1 - (heroProgress * 0.85); 
            const logoY = -(heroProgress * 12); 
            return (
                <div className="w-full">
                    <div className="relative w-full z-10">
                        <div className="absolute inset-0 w-full h-full pointer-events-none z-0">
                            <div className="sticky top-0 h-screen w-full">
                                <div className="absolute inset-0 bg-cover bg-center opacity-80" style={{ backgroundImage: "url('https://drive.google.com/thumbnail?id=1bF-GwJQpgupCHzX2cNal9KAYgDdvsea1&sz=w3000')" }} />
                                <div className="absolute inset-0 bg-black/60 z-10" />
                            </div>
                        </div>
                        <div className="absolute inset-0 w-full h-full pointer-events-none z-20">
                            <div className="sticky top-0 h-screen w-full flex items-center justify-center">
                                <img src="https://drive.google.com/thumbnail?id=1_AfeQO-hhZyAh-KkzHYYLpkA7FmGbA9z&sz=w2000" alt="JAMS" style={{ transform: `translateY(${logoY}vh) scale(${logoScale})` }} className="w-[70%] md:w-[45%] lg:w-[30%] max-w-[500px] object-contain drop-shadow-[0_0_40px_rgba(255,255,255,0.15)]" />
                            </div>
                        </div>
                        <div className="relative z-30">
                            <section className="snap-section w-full h-screen bg-transparent"></section>
                            <section id="about" className="snap-section relative w-full h-screen flex flex-col items-center justify-center px-6 bg-transparent">
                                <div className="font-inter text-sm md:text-base leading-relaxed font-light max-w-2xl text-center text-white/90 drop-shadow-md -translate-y-2 md:-translate-y-4">
                                    JAMS Investment is a small-but-elite, mentorship-driven finance talent platform. Through high-touch mentorship supported by solid technical training, we build stronger, more direct industry connections and a long-term pipeline. Every member can grow with greater focus, depth, and efficiency within limited resources.
                                </div>
                            </section>
                        </div>
                    </div>
                    <section className="snap-section bg-white flex flex-col justify-center items-center py-24 px-8 md:px-12 relative z-20">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-12 max-w-7xl w-full">
                            {pillarsHome.map((p, i) => (
                                <div key={i} className="flex flex-col items-start p-10 border border-[#191c1e]/5 bg-[#fbfcfd] hover:bg-white hover:shadow-2xl transition-all duration-500 group">
                                    <span className="text-3xl text-[#820000] mb-6 group-hover:scale-125 transition-transform">{p.icon}</span>
                                    <h4 className="font-inter font-black text-xl mb-4 tracking-tight uppercase">{p.title}</h4>
                                    <p className="font-inter text-sm text-[#191c1e]/60 leading-relaxed">{p.desc}</p>
                                </div>
                            ))}
                        </div>
                    </section>
                </div>
            );
        };

        const DipView = ({ scrollY, windowHeight }) => {
            const dipProgress = Math.max(0, Math.min(1, scrollY / windowHeight));
            const dipImageScale = 1 - (dipProgress * 0.82); 
            const dipImageY = -(dipProgress * 32); 

            // Timeline Config (完全依照圖片)
            const months = ["2026/3", "2026/4", "2026/5", "2026/6", "2026/7", "2026/8", "2026/9", "2026/10", "2026/11", "2026/12", "2027/1"];
            const timelineData = [
                { label: "IP 1: ER", type: "ip", start: 0, end: 2.3, row: 0 },
                { label: "IP 2: LBO / ECM DCM", type: "ip", start: 3.1, end: 4.8, row: 0 },
                { label: "GP 1: LBO PJ", type: "gp", start: 1.8, end: 7, row: 1 },
                { label: "IP 3: Project Finance / M&A", type: "ip", start: 5.5, end: 7.2, row: 2 },
                { label: "GP 2: M&A", type: "gp", start: 4.5, end: 9.2, row: 3 }
            ];

            return (
                <div className="w-full">
                    {/* Sticky Hero Animation (與首頁一致) */}
                    <div className="relative w-full z-10">
                        <div className="absolute inset-0 w-full h-full pointer-events-none z-0">
                            <div className="sticky top-0 h-screen w-full bg-[#0a0a0a]"></div>
                        </div>
                        <div className="absolute inset-0 w-full h-full pointer-events-none z-20">
                            <div className="sticky top-0 h-screen w-full flex items-center justify-center px-4 overflow-hidden">
                                <img src="https://drive.google.com/thumbnail?id=1WOS-DsLJesu97SGWafm-W_SVH46RNaLq&sz=w3000" alt="DIP" style={{ transform: `translateY(${dipImageY}vh) scale(${dipImageScale})`, transition: 'transform 0.1s ease-out' }} className="w-[85%] md:w-[65%] lg:w-[45%] max-w-[1000px] object-contain drop-shadow-[0_0_60px_rgba(255,255,255,0.1)]" />
                            </div>
                        </div>
                        <div className="relative z-30">
                            <section className="snap-section w-full h-screen bg-transparent"></section>
                            <section className="snap-section relative w-full h-screen flex flex-col items-center justify-center px-6 bg-transparent">
                                <div className="font-inter text-sm md:text-base leading-relaxed font-light max-w-2xl text-center text-white/90 drop-shadow-md translate-y-20">
                                    JAMS Direct Industry Program (DIP) is an exclusive, high-density training platform designed to bridge the gap between top Asian talent and global financial hubs. Through rigorous technical training and high-touch mentorship, we build a direct pipeline to the world's leading firms.
                                </div>
                            </section>
                        </div>
                    </div>

                    <div className="relative z-40 bg-white">
                        {/* Section: Cohort Selection */}
                        <section className="py-24 px-6 flex flex-col items-center border-b border-black/5 bg-[#f7f9fc]">
                            <span className="font-inter text-[10px] tracking-[0.4em] font-black text-[#820000] uppercase mb-12">Cohort Selection Results</span>
                            <div className="grid grid-cols-1 md:grid-cols-3 w-full max-w-6xl gap-12 divide-y md:divide-y-0 md:divide-x divide-black/10">
                                {statsDip.map((s, i) => (
                                    <div key={i} className="flex flex-col items-center py-8 md:py-0">
                                        <span className="font-libre font-bold text-7xl text-[#191c1e] tracking-tighter mb-2">{s.value}</span>
                                        <span className="font-inter font-bold text-xs tracking-widest text-black/50 uppercase">{s.label}</span>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* Section: Education Planning (重製線性時間軸) */}
                        <section className="relative w-full bg-[#1e455e] py-32 px-6 overflow-hidden">
                            {/* 山景背景背景 */}
                            <div className="absolute inset-0 bg-cover bg-center opacity-20 pointer-events-none" style={{ backgroundImage: "url('https://drive.google.com/thumbnail?id=1bF-GwJQpgupCHzX2cNal9KAYgDdvsea1&sz=w3000')" }} />
                            
                            <div className="max-w-6xl mx-auto relative z-10 text-white">
                                <div className="text-center mb-20">
                                    <h2 className="font-libre text-5xl md:text-6xl uppercase tracking-tighter mb-4">Education Planning</h2>
                                    <p className="font-inter text-xs tracking-[0.4em] opacity-60 font-bold uppercase">JAMS Direct Industry Program 2026</p>
                                </div>

                                {/* Linear Timeline Container */}
                                <div className="mb-32 overflow-x-auto no-scrollbar">
                                    <div className="min-w-[1000px] pb-10">
                                        {/* Legend */}
                                        <div className="flex justify-center gap-12 mb-16 text-[10px] font-black tracking-[0.2em] uppercase">
                                            <div className="flex items-center gap-3"><div className="w-3 h-3 bg-white"></div> Individual Project</div>
                                            <div className="flex items-center gap-3"><div className="w-3 h-3 bg-[#ff3b3b]"></div> Group Project</div>
                                        </div>

                                        <div className="timeline-grid">
                                            {months.map((m, i) => (
                                                <div key={i} className="timeline-month-label">{m}</div>
                                            ))}
                                            
                                            {/* Data-driven project bars */}
                                            {timelineData.map((p, i) => (
                                                <div 
                                                    key={i} 
                                                    className={`project-bar-v2 ${p.type === 'ip' ? 'project-bar-ip' : 'project-bar-gp'}`}
                                                    style={{
                                                        left: `calc(${(p.start / 10) * 100}%)`,
                                                        width: `calc(${( (p.end - p.start) / 10) * 100}%)`,
                                                        top: `${80 + (p.row * 40)}px`
                                                    }}
                                                >
                                                    {p.label}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                {/* Topics Table (複刻圖片排版) */}
                                <div className="bg-white rounded-sm shadow-2xl overflow-hidden text-[#1e455e] flex flex-col md:flex-row">
                                    <div className="topics-sidebar p-6 md:w-16">TOPICS</div>
                                    
                                    <div className="flex-1">
                                        <div className="grid grid-cols-1 md:grid-cols-2">
                                            {/* Left: Topic List */}
                                            <div className="divide-y divide-black/5 border-r border-black/5">
                                                {[
                                                    "Modeling Fundamentals", "3FS Projection", "Advanced Accounting",
                                                    "Enterprise Value & Equity Value", "WACC & DCF", "Trading Comparables",
                                                    "ECM / DCM Basics & Modeling", "Project Finance Modeling",
                                                    "Accretion/DILUTION Analysis", "M&A Modeling", "LBO Modeling"
                                                ].map((t, i) => (
                                                    <div key={i} className="p-4 text-xs font-bold uppercase tracking-wide hover:bg-slate-50 transition-colors flex items-center justify-between group">
                                                        <span>{t}</span>
                                                        <span className="text-[#ff3b3b] opacity-0 group-hover:opacity-100 transition-opacity">◈</span>
                                                    </div>
                                                ))}
                                            </div>

                                            {/* Right: Grouped Scopes */}
                                            <div className="bg-slate-50 flex flex-col divide-y divide-black/5 font-inter">
                                                <div className="p-8 flex-1 flex flex-col justify-center items-center text-center">
                                                    <div className="text-[10px] font-black opacity-30 uppercase mb-2">Scope A</div>
                                                    <div className="text-sm font-extrabold uppercase">Individual Project 1: <br/>Equity Research</div>
                                                </div>
                                                <div className="p-8 flex-1 flex flex-col justify-center items-center text-center">
                                                    <div className="text-[10px] font-black opacity-30 uppercase mb-2">Scope B</div>
                                                    <div className="text-sm font-extrabold uppercase leading-tight">
                                                        Individual Project 2: ECM / DCM <br/>
                                                        Individual Project 3: Project Finance
                                                    </div>
                                                </div>
                                                <div className="p-8 flex-1 flex flex-col justify-center items-center text-center bg-white">
                                                    <div className="text-[10px] font-black text-[#ff3b3b] uppercase mb-2 italic">Scope C - Capstone</div>
                                                    <div className="text-sm font-extrabold uppercase leading-tight">
                                                        Group Project 1: LBO PJ <br/>
                                                        Individual Project 2: LBO Modeling
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
            );
        };

        const TeamsView = () => (
            <div className="w-full">
                <section className="relative w-full h-screen flex flex-col items-center justify-center overflow-hidden bg-[#0a0a0a]">
                    <div className="absolute inset-0 bg-cover bg-center opacity-40" style={{ backgroundImage: "url('https://drive.google.com/thumbnail?id=1bF-GwJQpgupCHzX2cNal9KAYgDdvsea1&sz=w3000')" }} />
                    <div className="relative z-20 flex flex-col items-center text-center px-6 reveal-up">
                        <span className="font-inter text-xs tracking-[0.5em] text-[#ff3b3b] uppercase mb-4 font-bold">The People</span>
                        <h1 className="font-libre font-bold text-5xl md:text-7xl lg:text-[5rem] tracking-tighter uppercase leading-[1.1] text-white">MEET THE <br/> JAMS TEAM</h1>
                        <p className="font-inter text-sm md:text-base font-light text-white/50 mt-8 tracking-widest uppercase">Structure coming soon...</p>
                    </div>
                </section>
            </div>
        );

        // ==========================================
        // 主應用程式 (自訂路由邏輯)
        // ==========================================
        const App = () => {
            const getPageFromUrl = () => {
                const params = new URLSearchParams(window.location.search);
                return params.get('page') || 'home';
            };

            const [currentPage, setCurrentPage] = useState(getPageFromUrl());
            const [scrolled, setScrolled] = useState(false);
            const [scrollY, setScrollY] = useState(0);
            const [windowHeight, setWindowHeight] = useState(800);
            const containerRef = useRef(null);

            useEffect(() => {
                const handlePopState = () => setCurrentPage(getPageFromUrl());
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            const handleNavigate = (page) => {
                setCurrentPage(page);
                try {
                    const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + (page === 'home' ? '' : `?page=${page}`);
                    window.history.pushState({ path: newUrl }, '', newUrl);
                } catch (e) { console.log("Routing update."); }
            };

            const handleAboutClick = () => {
                if (currentPage !== 'home') {
                    handleNavigate('home');
                } else {
                    if (containerRef.current) containerRef.current.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };

            useEffect(() => {
                setWindowHeight(window.innerHeight);
                const handleResize = () => setWindowHeight(window.innerHeight);
                window.addEventListener('resize', handleResize);
                const container = containerRef.current;
                const handleScroll = () => {
                    const currentScroll = container.scrollTop;
                    setScrollY(currentScroll);
                    if (currentPage === 'home' || currentPage === 'dip') {
                        setScrolled(currentScroll > window.innerHeight * 1.5);
                    } else {
                        setScrolled(currentScroll > 100);
                    }
                };
                handleScroll();
                container.addEventListener('scroll', handleScroll, { passive: true });
                return () => {
                    window.removeEventListener('resize', handleResize);
                    container.removeEventListener('scroll', handleScroll);
                };
            }, [currentPage]);

            useEffect(() => { if (containerRef.current) containerRef.current.scrollTop = 0; }, [currentPage]);

            return (
                <div ref={containerRef} className="snap-container no-scrollbar relative bg-[#0a0a0a]">
                    <nav className={`fixed top-0 left-0 z-50 w-full flex items-center justify-between px-6 md:px-12 transition-all duration-700 ${scrolled ? 'bg-white/95 backdrop-blur-md text-[#191c1e] py-5 shadow-sm' : 'bg-transparent text-white py-8'}`}>
                        <div className="flex flex-col">
                            <button onClick={() => handleNavigate('home')} className="group text-left focus:outline-none">
                                <span className={`font-libre font-bold text-xl uppercase tracking-tighter block ${scrolled ? '' : 'drop-shadow-md'}`}>JAMS INVESTMENT</span>
                            </button>
                        </div>
                        <div className={`hidden md:flex gap-10 font-inter text-[10px] font-bold tracking-[0.2em] uppercase ${scrolled ? '' : 'drop-shadow-md'}`}>
                            <button onClick={handleAboutClick} className="hover:text-[#ff3b3b] transition-colors focus:outline-none tracking-[0.2em]">ABOUT</button>
                            <button onClick={() => handleNavigate('teams')} className={`hover:text-[#ff3b3b] transition-colors focus:outline-none tracking-[0.2em] ${currentPage === 'teams' ? 'text-[#ff3b3b]' : ''}`}>TEAMS</button>
                            <button onClick={() => handleNavigate('dip')} className={`hover:text-[#ff3b3b] transition-colors focus:outline-none tracking-[0.2em] ${currentPage === 'dip' ? 'text-[#ff3b3b]' : ''}`}>DIP</button>
                        </div>
                    </nav>

                    {currentPage === 'home' && <HomeView scrollY={scrollY} windowHeight={windowHeight} />}
                    {currentPage === 'dip' && <DipView scrollY={scrollY} windowHeight={windowHeight} />}
                    {currentPage === 'teams' && <TeamsView />}

                    <footer className="bg-[#0a0a0a] text-white px-8 md:px-12 py-16 flex flex-col md:flex-row justify-between items-center text-center md:text-left relative z-20 border-t border-white/5">
                        <button onClick={() => handleNavigate('home')} className="font-libre font-bold text-xl uppercase tracking-tighter hover:text-[#ff3b3b] transition-colors mb-4 md:mb-0 focus:outline-none">JAMS INVESTMENT</button>
                        <span className="font-inter text-[9px] tracking-[0.2em] font-bold opacity-30 uppercase">© 2026 JAMS INVESTMENT. All Rights Reserved.</span>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
